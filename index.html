
<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Feuille de Présence</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

</head>

<body class="bg-slate-100 p-4 md:p-8">

<div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">

  <!-- HEADER -->

  <div class="bg-slate-900 text-white p-6 md:p-8">

    <h1 class="text-2xl md:text-4xl font-bold">
      Feuille de Présence Digitale
    </h1>

    <p class="text-slate-300 mt-2">
      Temps réel • Firebase • QR Code
    </p>

  </div>

  <div class="p-6 md:p-8 space-y-10">

    <!-- INFOS FORMATION -->

    <div>

      <h2 class="text-2xl font-bold mb-6">
        Informations Formation
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input
          id="formation"
          class="border rounded-xl p-3"
          placeholder="Intitulé Formation"
        />

        <input
          id="organisme"
          class="border rounded-xl p-3"
          placeholder="Organisme"
        />

        <input
          id="dateDebut"
          type="date"
          class="border rounded-xl p-3"
        />

        <input
          id="dateFin"
          type="date"
          class="border rounded-xl p-3"
        />

        <input
          id="horaires"
          class="border rounded-xl p-3"
          placeholder="07h00 à 14h00"
        />

        <input
          id="formateur"
          class="border rounded-xl p-3"
          placeholder="Nom formateur"
        />

      </div>

    </div>

    <!-- QR CODE -->

    <div class="bg-slate-50 rounded-2xl p-6 border border-dashed text-center">

      <h2 class="text-2xl font-bold mb-4">
        Accès via QR Code
      </h2>

      <img
        src="qrcode.jpg"
        class="w-56 h-56 rounded-2xl object-cover mx-auto"
      />

      <p class="text-slate-500 mt-4">
        Les stagiaires scannent ce QR code pour signer leur présence.
      </p>

    </div>

    <!-- FORMULAIRE -->

    <div>

      <h2 class="text-2xl font-bold mb-6">
        Émargement Stagiaire
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input
          id="nom"
          class="border rounded-xl p-3"
          placeholder="Nom"
        />

        <input
          id="prenom"
          class="border rounded-xl p-3"
          placeholder="Prénom"
        />

        <input
          id="service"
          class="border rounded-xl p-3"
          placeholder="Service / Groupe"
        />

        <input
          id="heure"
          type="time"
          class="border rounded-xl p-3"
        />

      </div>

      <!-- SIGNATURE -->

      <div class="mt-8">

        <div class="flex items-center justify-between mb-3">

          <h3 class="font-semibold text-lg">
            Signature tactile
          </h3>

          <button
            id="clear-signature"
            class="text-sm bg-slate-200 px-4 py-2 rounded-xl"
          >
            Effacer signature
          </button>

        </div>

        <div class="border-2 border-dashed rounded-2xl overflow-hidden bg-slate-50">

          <canvas
            id="signature-pad"
            width="900"
            height="250"
            class="w-full h-56 touch-none"
          ></canvas>

        </div>

      </div>

      <button
        id="submit-btn"
        class="mt-8 w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl font-semibold"
      >
        Valider ma présence
      </button>

    </div>

    <!-- TABLEAU -->

    <div>

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">

        <h2 class="text-2xl font-bold">
          Tableau des Présences
        </h2>

        <div class="flex gap-3 flex-wrap">

          <button
            id="export-btn"
            class="bg-emerald-500 text-white px-5 py-3 rounded-2xl font-semibold"
          >
            Export CSV
          </button>

          <button
            id="reset-btn"
            class="bg-red-500 text-white px-5 py-3 rounded-2xl font-semibold"
          >
            Réinitialiser
          </button>

        </div>

      </div>

      <div class="overflow-x-auto border rounded-2xl">

        <table class="w-full text-sm">

          <thead class="bg-slate-100">

            <tr>
              <th class="text-left p-4">Nom</th>
              <th class="text-left p-4">Prénom</th>
              <th class="text-left p-4">Service</th>
              <th class="text-left p-4">Heure</th>
            </tr>

          </thead>

          <tbody id="presence-table"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script type="module">

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  databaseURL:
  "https://feuille-presence-8ad2b-default-rtdb.firebaseio.com/"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const presenceRef =
ref(db, "presences");

const table =
document.getElementById("presence-table");

const canvas =
document.getElementById("signature-pad");

const signaturePad =
new SignaturePad(canvas);

document
.getElementById("clear-signature")
.addEventListener("click", () => {

  signaturePad.clear();

});

function afficherPresences(data) {

  table.innerHTML = "";

  if (!data) {

    table.innerHTML = `
      <tr>
        <td colspan="4"
          class="p-6 text-center text-slate-400">
          Aucune présence enregistrée
        </td>
      </tr>
    `;

    return;

  }

  Object.values(data).forEach((presence) => {

    table.innerHTML += `
      <tr class="border-t">

        <td class="p-4">
          ${presence.nom}
        </td>

        <td class="p-4">
          ${presence.prenom}
        </td>

        <td class="p-4">
          ${presence.service}
        </td>

        <td class="p-4">
          ${presence.heure}
        </td>

      </tr>
    `;

  });

}

onValue(presenceRef, (snapshot) => {

  afficherPresences(snapshot.val());

});

document
.getElementById("submit-btn")
.addEventListener("click", async () => {

  const nom =
    document.getElementById("nom").value;

  const prenom =
    document.getElementById("prenom").value;

  const service =
    document.getElementById("service").value;

  const heure =
    document.getElementById("heure").value;

  if (!nom || !prenom) {

    alert("Veuillez remplir les champs");

    return;

  }

  if (signaturePad.isEmpty()) {

    alert("Veuillez signer");

    return;

  }

  await push(presenceRef, {

    formation:
      document.getElementById("formation").value,

    organisme:
      document.getElementById("organisme").value,

    dateDebut:
      document.getElementById("dateDebut").value,

    dateFin:
      document.getElementById("dateFin").value,

    formateur:
      document.getElementById("formateur").value,

    nom,
    prenom,
    service,
    heure,

    signature:
      signaturePad.toDataURL()

  });

  alert("Présence enregistrée ✅");

  signaturePad.clear();

  document.getElementById("nom").value = "";
  document.getElementById("prenom").value = "";
  document.getElementById("service").value = "";

});

document
.getElementById("reset-btn")
.addEventListener("click", async () => {

  const password =
    prompt("Mot de passe administrateur");

  if (password === "admin.edfaudreyfred") {

    await remove(presenceRef);

    alert("Présences supprimées ✅");

  } else {

    alert("Mot de passe incorrect");

  }

});

document
.getElementById("export-btn")
.addEventListener("click", () => {

  let csv =
    "Nom,Prénom,Service,Heure\n";

  const rows =
    table.querySelectorAll("tr");

  rows.forEach((row) => {

    const cols =
      row.querySelectorAll("td");

    if (cols.length > 0) {

      csv +=
        `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText}\n`;

    }

  });

  const blob =
    new Blob([csv], {
      type: "text/csv"
    });

  const url =
    window.URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download =
    "presences.csv";

  a.click();

});

</script>

</body>
</html>
