<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feuille de Présence</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 p-4 md:p-8">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">

  <div class="bg-slate-900 text-white p-6 md:p-8">
    <h1 class="text-2xl md:text-4xl font-bold">
      Feuille de Présence Digitale
    </h1>

    <p class="text-slate-300 mt-2">
      Accessible via QR Code • Responsive • Mobile First
    </p>
  </div>

  <div class="p-6 md:p-8 space-y-8">

    <div>
      <h2 class="text-xl font-semibold mb-4">
        Informations Formation
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input class="border rounded-xl p-3" placeholder="Intitulé Formation">

        <input class="border rounded-xl p-3" placeholder="Organisme">

        <input type="date" class="border rounded-xl p-3">

        <input type="date" class="border rounded-xl p-3">

        <input class="border rounded-xl p-3" placeholder="07h00 à 14h00">

        <input class="border rounded-xl p-3" placeholder="Nom formateur">

      </div>
    </div>

    <div class="bg-slate-50 rounded-2xl p-6 border border-dashed text-center">

      <h2 class="text-xl font-semibold mb-3">
        Accès via QR Code
      </h2>

      <div class="flex justify-center">

       <img src="qrcode.jpg" 
  class="w-44 h-44 rounded-2xl object-cover mx-auto"
/>

      </div>

      <p class="text-sm text-slate-500 mt-4">
        Les stagiaires scannent ce QR code pour signer leur présence.
      </p>
    </div>

    <div>

      <h2 class="text-xl font-semibold mb-4">
        Émargement Stagiaire
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input class="border rounded-xl p-3" placeholder="Nom">

        <input class="border rounded-xl p-3" placeholder="Prénom">

        <input class="border rounded-xl p-3" placeholder="Service / Groupe">

        <input type="time" class="border rounded-xl p-3">

      </div>

      <div class="mt-6">

        <div class="border-2 border-dashed rounded-2xl h-40 flex items-center justify-center text-slate-400 bg-slate-50">
          Zone de signature tactile
        </div>

      </div>

      <button class="mt-6 w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl font-semibold">
        Valider ma présence
      </button>

    </div>

  </div>

</div>

</body>
</html>
