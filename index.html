
<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Feuille de Présence V2</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

</head>

<body class="bg-slate-100 p-4 md:p-8">

<div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">

  <!-- HEADER -->

  <div class="bg-slate-900 text-white p-6 md:p-8">

    <h1 class="text-2xl md:text-4xl font-bold">
      Feuille de Présence Digitale
    </h1>

    <p class="text-slate-300 mt-2">
      Accessible via QR Code • Responsive • Mobile First
    </p>

  </div>

  <div class="p-6 md:p-8 space-y-10">

    <!-- INFOS FORMATION -->

    <div>

      <h2 class="text-xl font-semibold mb-4">
        Informations Formation
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input
          id="formation"
          class="border rounded-xl p-3"
          placeholder="Intitulé Formation"
        >

        <input
          id="organisme"
          class="border rounded-xl p-3"
          placeholder="Organisme"
        >

        <input
          id="dateDebut"
          type="date"
          class="border rounded-xl p-3"
        >

        <input
          id="dateFin"
          type="date"
          class="border rounded-xl p-3"
        >

        <input
          id="horaires"
          class="border rounded-xl p-3"
          placeholder="07h00 à 14h00"
        >

        <input
          id="formateur"
          class="border rounded-xl p-3"
          placeholder="Nom formateur"
        >

      </div>

    </div>

    <!-- QR CODE -->

    <div class="bg-slate-50 rounded-2xl p-6 border border-dashed text-center">

      <h2 class="text-2xl font-bold mb-4">
        Accès via QR Code
      </h2>

      <img
        src="qrcode.jpg"
        class="w-56 h-56 rounded-2xl object-cover mx-auto"
      />

      <p class="text-slate-500 mt-5">
        Les stagiaires scannent ce QR code pour signer leur présence.
      </p>

    </div>

    <!-- FORMULAIRE -->

    <div>

      <h2 class="text-2xl font-bold mb-6">
        Émargement Stagiaire
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input
          id="nom"
          class="border rounded-xl p-3"
          placeholder="Nom"
        >

        <input
          id="prenom"
          class="border rounded-xl p-3"
          placeholder="Prénom"
        >

        <input
          id="service"
          class="border rounded-xl p-3"
          placeholder="Service / Groupe"
        >

        <input
          id="heure"
          type="time"
          class="border rounded-xl p-3"
        >

      </div>

      <!-- SIGNATURE -->

      <div class="mt-8">

        <div class="flex items-center justify-between mb-3">

          <h3 class="font-semibold text-lg">
            Signature tactile
          </h3>

          <button
            id="clear-signature"
            class="text-sm bg-slate-200 px-4 py-2 rounded-xl"
          >
            Effacer signature
          </button>

        </div>

        <div class="border-2 border-dashed rounded-2xl overflow-hidden bg-slate-50">

          <canvas
            id="signature-pad"
            width="900"
            height="250"
            class="w-full h-56 touch-none"
          ></canvas>

        </div>

      </div>

      <button
        id="submit-btn"
        class="mt-8 w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl font-semibold"
      >
        Valider ma présence
      </button>

    </div>

    <!-- TABLEAU -->

    <div>

      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">

        <h2 class="text-2xl font-bold">
          Tableau des Présences
        </h2>

        <button
          id="reset-btn"
          class="bg-red-500 text-white px-5 py-3 rounded-2xl font-semibold"
        >
          Réinitialiser les présences
        </button>

      </div>

      <div class="overflow-x-auto border rounded-2xl">

        <table class="w-full text-sm">

          <thead class="bg-slate-100">

            <tr>
              <th class="text-left p-4">Nom</th>
              <th class="text-left p-4">Prénom</th>
              <th class="text-left p-4">Service</th>
              <th class="text-left p-4">Heure</th>
              <th class="text-left p-4">Signature</th>
            </tr>

          </thead>

          <tbody id="presence-table"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwd7eZMpW5v7RAE6IfBIuC60kLn6-yvLb8o7FVAn88LUAWtdJaGIynKKe0mjNvSpFpnFA/exec";

const canvas = document.getElementById("signature-pad");

const signaturePad = new SignaturePad(canvas);

const table = document.getElementById("presence-table");

const clearBtn = document.getElementById("clear-signature");

clearBtn.addEventListener("click", () => {

  signaturePad.clear();

});

function afficherPresences(data) {

  table.innerHTML = "";

  if (data.length === 0) {

    table.innerHTML = `
      <tr>
        <td colspan="5" class="p-6 text-center text-slate-400">
          Aucune présence enregistrée.
        </td>
      </tr>
    `;

    return;

  }

  data.forEach(presence => {

    const row = `
      <tr class="border-t">

        <td class="p-4">${presence.nom}</td>

        <td class="p-4">${presence.prenom}</td>

        <td class="p-4">${presence.service}</td>

        <td class="p-4">${presence.heure}</td>

        <td class="p-4">
          <img
            src="${presence.signature}"
            class="h-12"
          />
        </td>

      </tr>
    `;

    table.innerHTML += row;

const presences = JSON.parse(localStorage.getItem("presences")) || [];

presences.push({
  nom,
  prenom,
  service,
  heure,
  signature
});

localStorage.setItem(
  "presences",
  JSON.stringify(presences)
);
 
  });

}

async function chargerPresences() {

  try {

    const response = await fetch(API_URL);

    const data = await response.json();

    table.innerHTML = "";

    if (data.length === 0) {

      table.innerHTML = `
        <tr>
          <td colspan="5" class="p-6 text-center text-slate-400">
            Aucune présence enregistrée.
          </td>
        </tr>
      `;

      return;

    }

    data.forEach((presence) => {

      const row = `
        <tr class="border-t">

          <td class="p-4">${presence.nom || ""}</td>

          <td class="p-4">${presence.prenom || ""}</td>

          <td class="p-4">${presence.service || ""}</td>

          <td class="p-4">${presence.heure || ""}</td>

          <td class="p-4">

            <img
              src="${presence.signature || ""}"
              class="h-12"
            />

          </td>

        </tr>
      `;

      table.innerHTML += row;

    });

  } catch(error) {

    console.error(error);

  }

}

const presencesSauvegardees =
  JSON.parse(localStorage.getItem("presences")) || [];

if (presencesSauvegardees.length > 0) {

  table.innerHTML = "";

  presencesSauvegardees.forEach((presence) => {

    const row = `
      <tr class="border-t">

        <td class="p-4">${presence.nom}</td>

        <td class="p-4">${presence.prenom}</td>

        <td class="p-4">${presence.service}</td>

        <td class="p-4">${presence.heure}</td>

        <td class="p-4">

          <img
            src="${presence.signature}"
            class="h-12"
          />

        </td>

      </tr>
    `;

    table.innerHTML += row;

  });

}



document.getElementById("submit-btn").addEventListener("click", async () => {

  const formation = document.getElementById("formation").value;

  const organisme = document.getElementById("organisme").value;

  const dateDebut = document.getElementById("dateDebut").value;

  const dateFin = document.getElementById("dateFin").value;

  const formateur = document.getElementById("formateur").value;

  const nom = document.getElementById("nom").value;

  const prenom = document.getElementById("prenom").value;

  const service = document.getElementById("service").value;

  const heure = document.getElementById("heure").value;

  if (!nom || !prenom) {

    alert("Veuillez renseigner le nom et le prénom.");

    return;

  }

  if (signaturePad.isEmpty()) {

    alert("Veuillez signer avant validation.");

    return;

  }

  const signature = signaturePad.toDataURL();

  const data = {

  formation: document.getElementById("formation").value,

  organisme: document.getElementById("organisme").value,

  dateDebut: document.getElementById("dateDebut").value,

  dateFin: document.getElementById("dateFin").value,

  formateur: document.getElementById("formateur").value,

  nom: document.getElementById("nom").value,

  prenom: document.getElementById("prenom").value,

  service: document.getElementById("service").value,

  heure: document.getElementById("heure").value,

  signature: signaturePad.toDataURL()

};

try {

  const response = await fetch(API_URL, {

    method: "POST",

    body: JSON.stringify(data)

  });

  if (response.ok) {

    alert("Présence enregistrée ✅");

    const row = `
      <tr class="border-t">

        <td class="p-4">${nom}</td>

        <td class="p-4">${prenom}</td>

        <td class="p-4">${service}</td>

        <td class="p-4">${heure}</td>

        <td class="p-4">
          <img
            src="${signature}"
            class="h-12"
          />
        </td>

      </tr>
    `;

    table.innerHTML += row;

    signaturePad.clear();

  } else {

    alert("Erreur lors de l'enregistrement");

  }

} catch(error) {

  console.error(error);

  alert("Erreur JavaScript");

}



});

document.getElementById("reset-btn").addEventListener("click", () => {

  const password = prompt("Mot de passe administrateur");

  if (password === "admin.edfaudreyfred") {

    table.innerHTML = `
      <tr>
        <td colspan="5" class="p-6 text-center text-slate-400">
          Aucune présence enregistrée.
        </td>
      </tr>
    `;

    alert("Réinitialisation visuelle effectuée ✅");
localStorage.removeItem("presences");


  } else {

    alert("Mot de passe incorrect");

  }

});

</script>

</body>
</html>
